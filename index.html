
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CareerDev AI | 3D Spatial Intelligence</title>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&family=Geist+Mono:wght@100..900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              sans: ['Geist', 'ui-sans-serif', 'system-ui', '-apple-system', 'BlinkMacSystemFont', '"Segoe UI"', 'Roboto', '"Helvetica Neue"', 'Arial', 'sans-serif'],
              mono: ['"Geist Mono"', 'ui-monospace', 'SFMono-Regular', 'Menlo', 'Monaco', 'Consolas', 'monospace'],
            },
            boxShadow: {
              '3d': '0 20px 50px rgba(0,0,0,0.1), 0 5px 15px rgba(0,0,0,0.05)',
              '3d-hover': '0 30px 60px rgba(0,0,0,0.12), 0 10px 20px rgba(0,0,0,0.08)',
              'inner-soft': 'inset 0 2px 4px 0 rgba(0, 0, 0, 0.06)',
            },
            animation: {
              grid: "grid 15s linear infinite",
            },
            keyframes: {
              grid: {
                "0%": { transform: "translateY(-50%)" },
                "100%": { transform: "translateY(0)" },
              },
            },
          }
        }
      }
    </script>
    <style>
      :root {
        --color-bg: #020617;
        --color-surface: #0f172a;
        --color-muted-surface: #1e293b;
        --color-border: #334155;
        --color-text-secondary: #94a3b8;
        --color-text-primary: #f1f5f9;
        --color-heading: #ffffff;
        --color-bg-2: #4f46e5; /* Indigo-600 */
        --depth-bg: #020617;
      }
      
      .dark {
        --depth-bg: #020617;
      }
      
      body {
        perspective: 1200px;
        background: var(--depth-bg);
        color: var(--color-text-primary);
      }
      
      .tilt-card {
        transform-style: preserve-3d;
        transition: transform 0.4s cubic-bezier(0.23, 1, 0.32, 1), box-shadow 0.4s ease;
      }
      
      .glass-panel {
        background: rgba(15, 23, 42, 0.6);
        backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.05);
      }
      
      .btn-3d {
        position: relative;
        transition: all 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
        box-shadow: 0 6px 0px 0px #312e81; /* Dark indigo depth */
        background-color: #4f46e5;
        border: none;
        cursor: pointer;
      }
      
      .btn-3d:hover {
        transform: translateY(-4px);
        box-shadow: 0 10px 0px 0px #312e81, 0 0 35px -5px rgba(79, 70, 229, 0.6);
        background-color: #6366f1;
      }
      
      .btn-3d:active {
        transform: translateY(4px);
        box-shadow: 0 2px 0px 0px #312e81;
        transition: all 0.05s ease;
      }
      
      .custom-scrollbar::-webkit-scrollbar { width: 6px; }
      .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
      .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }

      /* Base hidden class for print elements when on screen */
      .print-only {
        position: fixed;
        left: -9999px;
        top: 0;
        visibility: hidden;
      }

      /* Print Optimization */
      @media print {
        @page {
          size: A4;
          margin: 0;
        }

        /* Hide entire React root except the specific container we want to print */
        body {
          background: white !important;
          margin: 0 !important;
          padding: 0 !important;
          overflow: visible !important;
          height: auto !important;
          -webkit-print-color-adjust: exact;
          print-color-adjust: exact;
        }

        #root {
          display: none !important;
        }

        .print-only {
          position: static !important;
          left: 0 !important;
          visibility: visible !important;
          display: block !important;
          width: 210mm !important;
          margin: 0 auto !important;
          background: white !important;
        }

        #resume-export-area {
          display: block !important;
          width: 210mm !important;
          min-height: 297mm !important;
          padding: 15mm !important;
          box-sizing: border-box !important;
          background: white !important;
          color: black !important;
          transform: none !important;
          box-shadow: none !important;
        }

        /* Ensure all Tailwind generated styles are respected but reset for print colors if needed */
        #resume-export-area * {
          visibility: visible !important;
        }

        section {
          page-break-inside: avoid !important;
          margin-bottom: 5mm !important;
        }

        /* Standardize some colors for print clarity */
        #resume-export-area h1 { color: #000 !important; }
        #resume-export-area h2 { border-bottom-color: #eee !important; }
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@19.0.0",
    "react/": "https://esm.sh/react@19.0.0/",
    "react-dom": "https://esm.sh/react-dom@19.0.0",
    "react-dom/": "https://esm.sh/react-dom@19.0.0/",
    "@google/genai": "https://esm.sh/@google/genai@1.3.0",
    "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@2.47.10",
    "lucide-react": "https://esm.sh/lucide-react@0.454.0?external=react",
    "tailwind-merge": "https://esm.sh/tailwind-merge@2.5.5",
    "clsx": "https://esm.sh/clsx@2.1.1",
    "framer-motion": "https://esm.sh/framer-motion@11.15.0?external=react,react-dom",
    "simplex-noise": "https://esm.sh/simplex-noise@4.0.3"
  }
}
</script>
</head>
  <body class="dark transition-colors duration-300 font-sans">
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
